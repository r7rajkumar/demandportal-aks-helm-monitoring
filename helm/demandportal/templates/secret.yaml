apiVersion: v1
kind: Secret
metadata:
  name: demandportal-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-user: {{ .Values.postgres.user | quote }}
  postgres-password: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  database-url: {{ include "demandportal.databaseUrl" . | quote }}
  secret-key: {{ required "secrets.appSecretKey is required" .Values.secrets.appSecretKey | quote }}
